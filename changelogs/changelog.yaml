ancestor: null
releases:
  0.1.0:
    modules:
    - description: Retrieve Proxmox VE API version information.
      name: version_info
      namespace: ''
    release_date: '2026-07-12'
  0.1.1:
    release_date: '2026-07-12'
  0.1.2:
    release_date: '2026-07-12'
  0.1.3:
    release_date: '2026-07-12'
  0.2.0:
    modules:
    - description: Manage Proxmox VE users.
      name: user
      namespace: ''
    release_date: '2026-07-12'
  0.2.1:
    changes:
      bugfixes:
      - user - surface a clear, actionable error when setting a password for a non-C(pve)-realm
        user (for example C(pam)) fails because the underlying system/LDAP/AD account
        does not exist yet, instead of only the raw Proxmox API error.
      minor_changes:
      - user - clarify in the documentation that C(password) is forwarded to the realm's
        own password mechanism for non-C(pve) realms rather than being ignored.
    fragments:
    - user-clearer-password-error.yml
    release_date: '2026-07-14'
  0.3.0:
    modules:
    - description: Manage Proxmox VE ACL entries.
      name: acl
      namespace: ''
    - description: Manage Proxmox VE groups.
      name: group
      namespace: ''
    - description: Manage Proxmox VE roles.
      name: role
      namespace: ''
    - description: Manage Proxmox VE API tokens for a user.
      name: user_token
      namespace: ''
  0.4.0:
    changes:
      breaking_changes:
      - all modules - C(api_backend) now defaults to C(local) instead of C(https),
        since running C(pvesh) on a Proxmox node the play already targets is the recommended
        pattern and needs no C(api_host), C(api_user), or credentials at all. Playbooks
        relying on the previous implicit C(https) default must now set C(api_backend=https)
        explicitly.
      bugfixes:
      - acl - drop the M() cross-module references in the description, the only place
        in the collection using that macro, since it was suspected of breaking documentation
        rendering on the Galaxy website; replaced with plain C() text.
    fragments:
    - acl-docs-galaxy-rendering.yml
    - api-backend-default-local.yml
    release_date: '2026-07-14'
