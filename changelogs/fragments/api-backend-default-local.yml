breaking_changes:
  - "all modules - C(api_backend) now defaults to C(local) instead of C(https),
    since running C(pvesh) on a Proxmox node the play already targets is the
    recommended pattern and needs no C(api_host), C(api_user), or credentials
    at all. Playbooks relying on the previous implicit C(https) default must
    now set C(api_backend=https) explicitly."
