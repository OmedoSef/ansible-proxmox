---
- name: Skip user_token module test when no target host is configured
  when: proxmox_local_host is not defined
  block:
    - name: Explain why this target is being skipped
      ansible.builtin.debug:
        msg: >-
          Skipping: proxmox_local_host is not set in
          tests/integration/integration_config.yml.

    - name: End the play early
      ansible.builtin.meta: end_play

# Delegates to the real Proxmox node over SSH, same pattern as
# version_info_local_auth/user/group - see their tasks/main.yml for why.
# Exercises the full omedosef.proxmox.user_token lifecycle (create, idempotent
# no-op, update, regenerate, delete) against real Proxmox VE, cleaning up the
# test token/user even if an assertion fails partway through.
- name: Exercise the user_token module's full lifecycle on the real Proxmox node
  delegate_to: "{{ proxmox_local_host }}"
  become: "{{ proxmox_local_become | default(true) }}"
  vars:
    ansible_user: "{{ proxmox_local_ssh_user | default('root') }}"
    ansible_ssh_private_key_file: "{{ proxmox_local_ssh_private_key_file | default(omit) }}"
    ansible_password: "{{ proxmox_local_ssh_password | default(omit) }}"
    ansible_python_interpreter: auto_silent
    test_userid: ansible-test-token-user@pve
    test_tokenid: ansible-test-token
  block:
    - name: Ensure proxmoxer is importable on the Proxmox node's Python interpreter
      ansible.builtin.pip:
        name: proxmoxer
        state: present
        extra_args: --break-system-packages

    - name: Ensure the test token does not already exist (leftover from a previous failed run)
      omedosef.proxmox.user_token:
        api_backend: local
        userid: "{{ test_userid }}"
        tokenid: "{{ test_tokenid }}"
        state: absent

    - name: Ensure the test user exists
      omedosef.proxmox.user:
        api_backend: local
        userid: "{{ test_userid }}"
        password: "Ansible-Test-Passw0rd-1!"

    - name: Create the test token
      omedosef.proxmox.user_token:
        api_backend: local
        userid: "{{ test_userid }}"
        tokenid: "{{ test_tokenid }}"
        comment: "Created by the omedosef.proxmox integration tests"
        privsep: true
      register: created

    - name: Assert the token was created with the requested attributes and a secret value
      ansible.builtin.assert:
        that:
          - created is changed
          - created.token.userid == test_userid
          - created.token.tokenid == test_tokenid
          - created.token.full_tokenid == test_userid ~ "!" ~ test_tokenid
          - created.token.comment == "Created by the omedosef.proxmox integration tests"
          - created.token.privsep | bool
          - created.token.value is defined
          - created.token.value | length > 0

    - name: Re-run the exact same creation task
      omedosef.proxmox.user_token:
        api_backend: local
        userid: "{{ test_userid }}"
        tokenid: "{{ test_tokenid }}"
        comment: "Created by the omedosef.proxmox integration tests"
        privsep: true
      register: recreated

    - name: Assert re-running the same task is a no-op and the secret is not re-exposed
      ansible.builtin.assert:
        that:
          - recreated is not changed
          - recreated.token.value is not defined

    - name: Update only the comment
      omedosef.proxmox.user_token:
        api_backend: local
        userid: "{{ test_userid }}"
        tokenid: "{{ test_tokenid }}"
        comment: "Updated comment"
      register: updated

    - name: Assert only the comment changed, privsep untouched and no secret surfaced
      ansible.builtin.assert:
        that:
          - updated is changed
          - updated.token.comment == "Updated comment"
          - updated.token.privsep | bool
          - updated.token.value is not defined

    - name: Rotate the token's secret
      omedosef.proxmox.user_token:
        api_backend: local
        userid: "{{ test_userid }}"
        tokenid: "{{ test_tokenid }}"
        regenerate: true
      register: rotated

    - name: Assert regeneration reports changed and surfaces a new secret
      ansible.builtin.assert:
        that:
          - rotated is changed
          - rotated.token.value is defined
          - rotated.token.value | length > 0
          - rotated.token.value != created.token.value

    - name: Remove the test token
      omedosef.proxmox.user_token:
        api_backend: local
        userid: "{{ test_userid }}"
        tokenid: "{{ test_tokenid }}"
        state: absent
      register: deleted

    - name: Assert the token was removed
      ansible.builtin.assert:
        that:
          - deleted is changed
          - deleted.token is none

    - name: Remove the test token again
      omedosef.proxmox.user_token:
        api_backend: local
        userid: "{{ test_userid }}"
        tokenid: "{{ test_tokenid }}"
        state: absent
      register: deleted_again

    - name: Assert removing an already-absent token is a no-op
      ansible.builtin.assert:
        that:
          - deleted_again is not changed
  always:
    # state=absent is already idempotent, so no failed_when/ignore_errors is
    # needed here.
    - name: Clean up the test token
      omedosef.proxmox.user_token:
        api_backend: local
        userid: "{{ test_userid }}"
        tokenid: "{{ test_tokenid }}"
        state: absent

    - name: Clean up the test user
      omedosef.proxmox.user:
        api_backend: local
        userid: "{{ test_userid }}"
        state: absent
