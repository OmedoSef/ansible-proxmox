---
- name: Skip API token authentication test when no token is configured
  when: proxmox_api_token_id is not defined or proxmox_api_token_secret is not defined
  block:
    - name: Explain why this target is being skipped
      ansible.builtin.debug:
        msg: >-
          Skipping: proxmox_api_token_id and/or proxmox_api_token_secret are
          not set in tests/integration/integration_config.yml.

    - name: End the play early
      ansible.builtin.meta: end_play

- name: Retrieve the Proxmox VE version using API token authentication
  omedosef.proxmox.version_info:
    api_backend: https
    api_host: "{{ proxmox_api_host }}"
    api_port: "{{ proxmox_api_port | default(8006) }}"
    api_user: "{{ proxmox_api_user }}"
    api_token_id: "{{ proxmox_api_token_id }}"
    api_token_secret: "{{ proxmox_api_token_secret }}"
    validate_certs: "{{ proxmox_validate_certs | default(false) }}"
  register: result

- name: Assert the API returned version information
  ansible.builtin.assert:
    that:
      - result is not changed
      - result.version.version is defined
      - result.version.version | length > 0
