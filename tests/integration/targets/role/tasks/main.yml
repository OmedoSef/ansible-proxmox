---
- name: Skip role module test when no target host is configured
  when: proxmox_local_host is not defined
  block:
    - name: Explain why this target is being skipped
      ansible.builtin.debug:
        msg: >-
          Skipping: proxmox_local_host is not set in
          tests/integration/integration_config.yml.

    - name: End the play early
      ansible.builtin.meta: end_play

# Delegates to the real Proxmox node over SSH, same pattern as
# version_info_local_auth/user/group - see their tasks/main.yml for why.
# Exercises the full omedosef.proxmox.role lifecycle (create, idempotent
# no-op, replace privs, strip all privs, delete) against real Proxmox VE,
# plus the built-in-role protection surfaced by the API, cleaning up the
# test role even if an assertion fails partway through.
- name: Exercise the role module's full lifecycle on the real Proxmox node
  delegate_to: "{{ proxmox_local_host }}"
  become: "{{ proxmox_local_become | default(true) }}"
  vars:
    ansible_user: "{{ proxmox_local_ssh_user | default('root') }}"
    ansible_ssh_private_key_file: "{{ proxmox_local_ssh_private_key_file | default(omit) }}"
    ansible_password: "{{ proxmox_local_ssh_password | default(omit) }}"
    ansible_python_interpreter: auto_silent
    test_roleid: ansible-test-role
  block:
    - name: Ensure proxmoxer is importable on the Proxmox node's Python interpreter
      ansible.builtin.pip:
        name: proxmoxer
        state: present
        extra_args: --break-system-packages

    - name: Ensure the test role does not already exist (leftover from a previous failed run)
      omedosef.proxmox.role:
        api_backend: local
        roleid: "{{ test_roleid }}"
        state: absent

    - name: Create the test role
      omedosef.proxmox.role:
        api_backend: local
        roleid: "{{ test_roleid }}"
        privs:
          - VM.Audit
          - VM.PowerMgmt
      register: created

    - name: Assert the role was created with the requested privileges
      ansible.builtin.assert:
        that:
          - created is changed
          - created.role.roleid == test_roleid
          - created.role.privs == ["VM.Audit", "VM.PowerMgmt"]

    - name: Re-run the exact same creation task
      omedosef.proxmox.role:
        api_backend: local
        roleid: "{{ test_roleid }}"
        privs:
          - VM.PowerMgmt
          - VM.Audit
      register: recreated

    - name: Assert re-running with the same privileges (different order) is a no-op
      ansible.builtin.assert:
        that:
          - recreated is not changed

    - name: Leave privs untouched by omitting the option
      omedosef.proxmox.role:
        api_backend: local
        roleid: "{{ test_roleid }}"
      register: untouched

    - name: Assert omitting privs is a no-op
      ansible.builtin.assert:
        that:
          - untouched is not changed
          - untouched.role.privs == ["VM.Audit", "VM.PowerMgmt"]

    - name: Replace the privileges with a smaller set
      omedosef.proxmox.role:
        api_backend: local
        roleid: "{{ test_roleid }}"
        privs:
          - VM.Audit
      register: updated

    - name: Assert only the requested privilege remains
      ansible.builtin.assert:
        that:
          - updated is changed
          - updated.role.privs == ["VM.Audit"]

    - name: Strip all privileges
      omedosef.proxmox.role:
        api_backend: local
        roleid: "{{ test_roleid }}"
        privs: []
      register: stripped

    - name: Assert the role now has no privileges
      ansible.builtin.assert:
        that:
          - stripped is changed
          - stripped.role.privs == []

    - name: Attempt to update a built-in role
      omedosef.proxmox.role:
        api_backend: local
        roleid: PVEAuditor
        privs:
          - VM.Audit
      register: update_builtin
      ignore_errors: true

    - name: Assert the API rejects modifying a built-in role
      ansible.builtin.assert:
        that:
          - update_builtin is failed
          - "'cannot be modified' in update_builtin.msg"

    - name: Remove the test role
      omedosef.proxmox.role:
        api_backend: local
        roleid: "{{ test_roleid }}"
        state: absent
      register: deleted

    - name: Assert the role was removed
      ansible.builtin.assert:
        that:
          - deleted is changed
          - deleted.role is none

    - name: Remove the test role again
      omedosef.proxmox.role:
        api_backend: local
        roleid: "{{ test_roleid }}"
        state: absent
      register: deleted_again

    - name: Assert removing an already-absent role is a no-op
      ansible.builtin.assert:
        that:
          - deleted_again is not changed
  always:
    # state=absent is already idempotent, so no failed_when/ignore_errors is
    # needed here.
    - name: Clean up the test role
      omedosef.proxmox.role:
        api_backend: local
        roleid: "{{ test_roleid }}"
        state: absent
