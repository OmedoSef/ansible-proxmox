---
name: Bug report
description: Report a problem with a module, plugin, or the collection itself
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: >-
        Thanks for taking the time to report a bug. Filling in as much of
        this as you can saves a lot of back-and-forth during triage.

  - type: input
    id: collection-version
    attributes:
      label: Collection version
      description: Output of `ansible-galaxy collection list | grep omedosef.proxmox`
      placeholder: "0.1.3"
    validations:
      required: true

  - type: input
    id: ansible-version
    attributes:
      label: ansible-core version
      description: Output of `ansible --version`
      placeholder: "2.17.4"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version (control node)
      placeholder: "3.12.4"
    validations:
      required: true

  - type: dropdown
    id: api-backend
    attributes:
      label: api_backend in use
      options:
        - https
        - ssh_paramiko
        - local
        - Not sure / not applicable
    validations:
      required: true

  - type: input
    id: proxmox-version
    attributes:
      label: Proxmox VE version
      placeholder: "8.3.2"
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: Module or plugin affected
      placeholder: "version_info"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: A minimal playbook/task that reproduces the issue, if possible.
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant output / logs
      description: Run with `-vvv` if possible.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checks
      options:
        - label: I searched existing issues before opening this one
          required: true
        - label: This is not a security vulnerability (see SECURITY.md if it is)
          required: true
