---
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Load shared Python version
        run: cat .github/python-version.env >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - uses: pre-commit/action@v3.0.1

  units:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out collection at the expected collection path
        uses: actions/checkout@v7
        with:
          path: ansible_collections/omedosef/proxmox

      - name: Load shared Python version
        run: cat ansible_collections/omedosef/proxmox/.github/python-version.env >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
        working-directory: ansible_collections/omedosef/proxmox

      - name: Run unit tests
        run: ansible-test units --python "${PYTHON_VERSION}"
        working-directory: ansible_collections/omedosef/proxmox

  sanity:
    name: Sanity tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out collection at the expected collection path
        uses: actions/checkout@v7
        with:
          path: ansible_collections/omedosef/proxmox

      - name: Load shared Python version
        run: cat ansible_collections/omedosef/proxmox/.github/python-version.env >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ansible-core
        run: pip install "ansible-core>=2.17"

      - name: Run sanity tests
        run: ansible-test sanity --python "${PYTHON_VERSION}"
        working-directory: ansible_collections/omedosef/proxmox
