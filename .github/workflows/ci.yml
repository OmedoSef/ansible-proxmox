---
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Load shared Python version
        run: cat .github/python-version.env >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Cache pre-commit environments
        uses: actions/cache@v6
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ env.PYTHON_VERSION }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # Not using pre-commit/action@v3.0.1: it hasn't been updated since
      # 2024 and still uses Node 20-based actions internally
      # (actions/cache@v4), which GitHub Actions now flags as deprecated.
      # This does the same two things it did (cache the pre-commit
      # environments, run all hooks) without that dependency.
      - name: Run pre-commit
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  units:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out collection at the expected collection path
        uses: actions/checkout@v7
        with:
          path: ansible_collections/omedosef/proxmox

      - name: Load shared Python version
        run: cat ansible_collections/omedosef/proxmox/.github/python-version.env >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
        working-directory: ansible_collections/omedosef/proxmox

      - name: Run unit tests
        run: ansible-test units --python "${PYTHON_VERSION}"
        working-directory: ansible_collections/omedosef/proxmox

  sanity:
    name: Sanity tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out collection at the expected collection path
        uses: actions/checkout@v7
        with:
          path: ansible_collections/omedosef/proxmox

      - name: Load shared Python version
        run: cat ansible_collections/omedosef/proxmox/.github/python-version.env >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ansible-core
        run: pip install "ansible-core>=2.17"

      - name: Run sanity tests
        run: ansible-test sanity --python "${PYTHON_VERSION}"
        working-directory: ansible_collections/omedosef/proxmox
